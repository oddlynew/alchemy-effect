                    description: The programming language of the workflow implementation
                  modified_on:
                    type: string
                  workflow_id:
                    type: string
                  limits:
                    type: object
                    properties:
                      steps:
                        type: number
                required:
                  - id
                  - class_name
                  - created_on
                  - has_dag
                  - language
                  - modified_on
                  - workflow_id
      x-distilled-pagination-class: VersionListResponsesV4PagePaginationArray
      x-distilled-errors:
        WorkflowNotFound:
          - code: 10200
        InvalidRoute:
          - code: 7003
  /accounts/{account_id}/workflows/{workflowName}/versions/{versionId}/graph:
    get:
      operationId: graphVersion
      description: Retrieves the graph visualization of a workflow version.
      parameters:
        - name: workflowName
          in: path
          required: true
          schema:
            type: string
        - name: versionId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  class_name:
                    type: string
                  created_on:
                    type: string
                  graph:
                    oneOf:
                      - type: object
                        properties:
                          version:
                            type: number
                          workflow:
                            type: object
                            properties:
                              class_name:
                                type: string
                              functions:
                                type: object
                                additionalProperties: true
                              nodes:
                                type: array
                                items:
                                  oneOf:
                                    - type: object
                                      properties:
                                        duration:
                                          oneOf:
                                            - type: number
                                            - type: string
                                          description: Duration as milliseconds (number) or human-readable string.
                                        name:
                                          type: string
                                        type:
                                          type: string
                                          enum:
                                            - step_sleep
                                        resolves:
                                          type: number
                                        starts:
                                          type: number
                                      required:
                                        - duration
                                        - name
                                        - type
                                    - type: object
                                      properties:
                                        config:
                                          type: object
                                          properties:
                                            retries:
                                              type: object
                                              properties:
                                                backoff:
                                                  type: string
                                                  enum:
                                                    - constant
                                                    - linear
                                                    - exponential
                                                  description: Backoff strategy for step retries.
                                                delay:
                                                  oneOf:
                                                    - type: number
                                                    - type: string
                                                  description: Duration as milliseconds (number) or human-readable string.
                                                limit:
                                                  type: number
                                              required:
                                                - backoff
                                                - delay
                                                - limit
                                              description: Retry policy for a step.
                                            timeout:
                                              oneOf:
                                                - type: number
                                                - type: string
                                              description: Duration as milliseconds (number) or human-readable string.
                                          required:
                                            - retries
                                            - timeout
                                          description: Configuration for a step (retries and timeout).
                                        name:
                                          type: string
