openapi: 3.1.0
info:
  title: Cloudflare FLAGSHIP API
  version: 0.0.0
servers:
  - url: https://api.cloudflare.com/client/v4
x-distilled-service: flagship
paths:
  /accounts/{account_id}/flagship/apps/{appId}:
    get:
      operationId: getApp
      description:
        Returns an app's name and audit fields. Flag definitions are not
        included.
      parameters:
        - name: appId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: Cloudflare account ID.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  created_at:
                    type: string
                  name:
                    type: string
                  updated_at:
                    type: string
                  updated_by:
                    type: string
                    description:
                      Email of the actor who last modified the app, or `edge-gateway` for
                      gateway-authenticated changes.
                required:
                  - id
                  - created_at
                  - name
                  - updated_at
                  - updated_by
      x-distilled-response-path: result
      x-distilled-errors:
        FlagshipAppNotFound:
          - status: 404
            message:
              includes: App not found
    put:
      operationId: updateApp
      description: Updates an app. Only `name` is mutable.
      parameters:
        - name: appId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: "Path param: Cloudflare account ID."
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Body param
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  created_at:
                    type: string
                  name:
                    type: string
                  updated_at:
                    type: string
                  updated_by:
                    type: string
                    description:
                      Email of the actor who last modified the app, or `edge-gateway` for
                      gateway-authenticated changes.
                required:
                  - id
                  - created_at
                  - name
                  - updated_at
                  - updated_by
      x-distilled-response-path: result
      x-distilled-errors:
        FlagshipAppNotFound:
          - status: 404
            message:
              includes: App not found
    delete:
      operationId: deleteApp
      description:
        Deletes an app and all its flags and changelog history. Returns 409
        if any Worker still references this app via a Flagship binding.
      parameters:
        - name: appId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: Cloudflare account ID.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                required:
                  - id
      x-distilled-response-path: result
      x-distilled-errors:
        FlagshipAppNotFound:
          - status: 404
            message:
              includes: App not found
  /accounts/{account_id}/flagship/apps:
    get:
      operationId: listApps
      description:
        Lists all apps in the account. Returns identity and audit fields
        only — flag definitions are not included.
      parameters:
        - name: account_id
          in: path
          required: true
          description: Cloudflare account ID.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  created_at:
                    type: string
                  name:
                    type: string
                  updated_at:
                    type: string
                  updated_by:
                    type: string
                    description:
                      Email of the actor who last modified the app, or `edge-gateway` for
                      gateway-authenticated changes.
                required:
                  - id
                  - created_at
                  - name
                  - updated_at
                  - updated_by
      x-distilled-pagination-class: AppListResponsesSinglePage
    post:
      operationId: createApp
      description:
        Creates an app. The returned `id` is used in all subsequent flag,
        changelog, and evaluation requests.
      parameters:
        - name: account_id
          in: path
          required: true
          description: "Path param: Cloudflare account ID."
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Body param
              required:
                - name
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  created_at:
                    type: string
                  name:
                    type: string
                  updated_at:
                    type: string
                  updated_by:
                    type: string
                    description:
                      Email of the actor who last modified the app, or `edge-gateway` for
                      gateway-authenticated changes.
                required:
                  - id
                  - created_at
                  - name
                  - updated_at
                  - updated_by
      x-distilled-response-path: result
  /accounts/{account_id}/flagship/apps/{appId}/evaluate:
    get:
      operationId: getAppEvaluate
      description: Evaluates a flag against the provided context. Pass context
        attributes as query parameters; boolean and numeric strings are coerced
        automatically. For low-latency in-Worker evaluation, prefer the Flagship
        binding over this endpoint.
      parameters:
        - name: appId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: "Path param: Cloudflare account ID."
          schema:
            type: string
        - name: flagKey
          in: query
          required: true
          description: "Query param: The flag key to evaluate."
          schema:
            type: string
        - name: targetingKey
          in: query
          required: false
          description:
            "Query param: Context targeting key (per OpenFeature spec); used
            for percentage rollout bucketing."
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  flagKey:
                    type: string
                  reason:
                    type: string
                    enum:
                      - TARGETING_MATCH
                      - DEFAULT
                      - DISABLED
                      - SPLIT
                  variant:
                    type: string
                  value:
                    oneOf:
                      - type: string
                      - type: number
                      - type: boolean
                      - type: object
                        additionalProperties: true
                      - type: array
                        items: {}
                    nullable: true
                required:
                  - flagKey
                  - reason
                  - variant
