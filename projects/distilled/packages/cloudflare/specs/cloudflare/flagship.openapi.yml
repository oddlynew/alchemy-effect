                          description:
                            Conditions the context must satisfy for this rule to match. An
                            empty array matches all contexts.
                        priority:
                          type: number
                          description:
                            Evaluation order; lower numbers are evaluated first. Must be unique
                            across the flag's rules.
                        serve_variation:
                          type: string
                          description:
                            Variation served when this rule matches. Must be a key in
                            `variations`.
                        rollout:
                          type: object
                          properties:
                            percentage:
                              type: number
                              description:
                                Percentage of matching traffic (0–100) served this variation. For
                                multi-way splits, use cumulative upper bounds
                                across rules (e.g. 30, 70, 100).
                            attribute:
                              type: string
                              description:
                                Context attribute used for sticky bucketing. Defaults to
                                `targetingKey`. If absent at evaluation time,
                                bucketing is random per request.
                          required:
