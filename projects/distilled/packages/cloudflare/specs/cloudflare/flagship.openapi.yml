                        - serve_variation
                    description:
                      Targeting rules evaluated in ascending `priority`; the first
                      matching rule wins. An empty array means the flag always
                      serves `default_variation`.
                  variations:
                    type: object
                    additionalProperties: true
                    description:
                      Map of variation name to value. All values must be the same type
                      (boolean, string, number, or JSON object/array). Each
                      serialized value must be 10KB or smaller.
                  description:
                    oneOf:
                      - type: string
                    nullable: true
                  type:
