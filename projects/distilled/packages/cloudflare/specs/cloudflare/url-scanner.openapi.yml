  /accounts/{account_id}/urlscanner/v2/search:
    get:
      operationId: listScans
      description:
        "Use a subset of ElasticSearch Query syntax to filter scans. Some
        example queries:<br/> <br/>- 'path:\"/bundles/jquery.js\"': Searches for
        scans who requested resources with the given path.<br/>-
        'page.asn:AS24940 AND hash:xxx': Websites hosted in AS24940 where a
        resource with the given hash was downloaded.<br/>-
        'page.domain:microsoft\\ AND verdicts.malicious:true AND NOT
        page.domain:microsoft.com': malicious scans whose hostname starts with
        \"microsoft\".<br/>- 'apikey:me AND date:[2025-01 TO 2025-02]': my scans
        from 2025 January to 2025 February.  @example ```ts const scans = await
        client.urlScanner.scans.list({ account_id: 'account_id', }); ```"
      parameters:
        - name: account_id
          in: path
          required: true
          description: "Path param: Account ID."
          schema:
            type: string
        - name: q
          in: query
          required: false
          description: "Query param: Filter scans"
          schema:
            type: string
        - name: size
          in: query
          required: false
          description: "Query param: Limit the number of objects in the response."
          schema:
            type: number
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        _id:
                          type: string
                        page:
                          type: object
                          properties:
                            asn:
                              type: string
                            country:
                              type: string
                            ip:
                              type: string
                            url:
                              type: string
                          required:
                            - asn
                            - country
                            - ip
                            - url
                        result:
                          type: string
                        stats:
                          type: object
                          properties:
                            dataLength:
                              type: number
                            requests:
                              type: number
                            uniqCountries:
                              type: number
                            uniqIPs:
                              type: number
                          required:
                            - dataLength
                            - requests
                            - uniqCountries
                            - uniqIPs
                        task:
                          type: object
                          properties:
                            time:
                              type: string
                            url:
                              type: string
                            uuid:
                              type: string
                            visibility:
                              type: string
                          required:
                            - time
                            - url
                            - uuid
                            - visibility
                        verdicts:
                          type: object
                          properties:
                            malicious:
                              type: boolean
                          required:
                            - malicious
                      required:
                        - _id
                        - page
                        - result
                        - stats
                        - task
                        - verdicts
                required:
                  - results
