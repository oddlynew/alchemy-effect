openapi: 3.1.0
info:
  title: Cloudflare URL-SCANNER API
  version: 0.0.0
servers:
  - url: https://api.cloudflare.com/client/v4
x-distilled-service: url-scanner
paths:
  /accounts/{account_id}/urlscanner/v2/responses/{responseId}:
    get:
      operationId: getRespons
      description: "Returns the raw response of the network request. Find the
        `response_id` in the `data.requests.response.hash`.  @example ```ts
        const response = await client.urlScanner.responses.get( 'response_id', {
        account_id: 'account_id' }, ); ```"
      parameters:
        - name: responseId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: Account ID.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: string
  /accounts/{account_id}/urlscanner/v2/result/{scanId}:
    get:
      operationId: getScan
      description: "Get URL scan by uuid  @example ```ts const scan = await
        client.urlScanner.scans.get( '182bd5e5-6e1a-4fe4-a799-aa6d9a6ab26e', {
        account_id: 'account_id' }, ); ```"
      parameters:
        - name: scanId
          in: path
          required: true
          schema:
            type: string
        - name: account_id
          in: path
          required: true
          description: Account ID.
          schema:
            type: string
