      parameters:
        - name: zone_id
          in: path
          required: true
          description: "Path param: Defines an identifier."
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: number
        - name: per_page
          in: query
          required: false
          schema:
            type: number
        - name: id
          in: query
          required: false
          description: "Query param: The unique identifier of the filter."
          schema:
            type: string
        - name: description
          in: query
          required: false
          description: "Query param: A case-insensitive string to find in the description."
          schema:
            type: string
        - name: expression
          in: query
          required: false
          description: "Query param: A case-insensitive string to find in the expression."
          schema:
            type: string
        - name: paused
          in: query
          required: false
          description:
            "Query param: When true, indicates that the filter is currently
            paused."
          schema:
            type: boolean
        - name: ref
          in: query
          required: false
          description:
            "Query param: The filter ref (a short reference tag) to search for.
            Must be an exact match."
          schema:
            type: string
      responses:
