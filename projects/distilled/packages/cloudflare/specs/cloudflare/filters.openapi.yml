  /zones/{zone_id}/filters/{filterId}:
    get:
      operationId: getFilter
      description:
        Fetches the details of a filter.  @deprecated The Filters API is
        deprecated in favour of using the Ruleset Engine. See
        https://developers.cloudflare.com/fundamentals/api/reference/deprecations/#firewall-rules-api-and-filters-api
        for full details.
      parameters:
        - name: filterId
          in: path
          required: true
          schema:
            type: string
        - name: zone_id
          in: path
          required: true
          description: Defines an identifier.
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: The unique identifier of the filter.
                  description:
                    type: string
                    description: An informative summary of the filter.
                  expression:
                    type: string
                    description:
                      The filter expression. For more information, refer to
                      [Expressions](https://developers.cloudflare.com/ruleset-engine/rules-language/expressions/).
                  paused:
                    type: boolean
                    description: When true, indicates that the filter is currently paused.
                  ref:
                    type: string
                    description: A short reference tag. Allows you to select related filters.
      x-distilled-response-path: result
