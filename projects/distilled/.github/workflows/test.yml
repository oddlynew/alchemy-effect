name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      core: ${{ steps.changes.outputs.core }}
      aws: ${{ steps.changes.outputs.aws }}
      cloudflare: ${{ steps.changes.outputs.cloudflare }}
      gcp: ${{ steps.changes.outputs.gcp }}
      neon: ${{ steps.changes.outputs.neon }}
      planetscale: ${{ steps.changes.outputs.planetscale }}
      prisma-postgres: ${{ steps.changes.outputs.prisma-postgres }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            core:
              - 'packages/core/**'
            aws:
              - 'packages/aws/**'
              - 'packages/core/**'
            cloudflare:
              - 'packages/cloudflare/**'
              - 'packages/core/**'
            gcp:
              - 'packages/gcp/**'
              - 'packages/core/**'
            neon:
              - 'packages/neon/**'
              - 'packages/core/**'
            planetscale:
              - 'packages/planetscale/**'
              - 'packages/core/**'
            prisma-postgres:
              - 'packages/prisma-postgres/**'
              - 'packages/core/**'

  ci-core:
    needs: detect-changes
    if: needs.detect-changes.outputs.core == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run check
        working-directory: packages/core

  ci-aws:
    needs: detect-changes
    if: needs.detect-changes.outputs.aws == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::391965393224:role/distilled-github-oidc-role
          aws-region: us-west-2
      - run: bun install
      - run: bun run build
        working-directory: packages/core
      - run: bun run specs:fetch
        working-directory: packages/aws
      - run: bun run check
        working-directory: packages/aws
      - run: bun run test
        working-directory: packages/aws

  ci-cloudflare:
    needs: detect-changes
    if: needs.detect-changes.outputs.cloudflare == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run build
        working-directory: packages/core
      - run: bun run check
        working-directory: packages/cloudflare
      - run: bun run test
        working-directory: packages/cloudflare
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_API_EMAIL: ${{ secrets.CLOUDFLARE_API_EMAIL }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_ACM_ZONE_ID: ${{ secrets.CLOUDFLARE_ACM_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  ci-gcp:
    needs: detect-changes
    if: needs.detect-changes.outputs.gcp == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run build
        working-directory: packages/core
      - run: bun run check
        working-directory: packages/gcp

  ci-neon:
    needs: detect-changes
    if: needs.detect-changes.outputs.neon == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run build
        working-directory: packages/core
      - run: bun run check
        working-directory: packages/neon
      - run: bun run test
        working-directory: packages/neon
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}

  ci-planetscale:
    needs: detect-changes
    if: needs.detect-changes.outputs.planetscale == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run build
        working-directory: packages/core
      - run: bun run check
        working-directory: packages/planetscale
      - run: bun run test
        working-directory: packages/planetscale
        env:
          PLANETSCALE_API_TOKEN: ${{ secrets.PLANETSCALE_API_TOKEN }}
          PLANETSCALE_ORGANIZATION: ${{ secrets.PLANETSCALE_ORGANIZATION }}

  ci-prisma-postgres:
    needs: detect-changes
    if: needs.detect-changes.outputs.prisma-postgres == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run build
        working-directory: packages/core
      - run: bun run check
        working-directory: packages/prisma-postgres
