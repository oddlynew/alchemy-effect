name: Release NPM Packages

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      version-override:
        description: "Exact version override (e.g. 0.2.0-alpha). Leave empty to use bump type."
        required: false
        type: string
      skip-github-release:
        description: "Skip creating git tag and GitHub release"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-large-arm
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          fetch-depth: 0

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          registry-url: https://registry.npmjs.org/
          node-version: 22

      - name: Upgrade npm for OIDC trusted publishing
        run: |
          npm install -g npm@latest && npm --version
          sed -i '/always-auth/d' ~/.npmrc 2>/dev/null || true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Bump versions
        id: bump
        run: |
          if [ -n "${{ inputs.version-override }}" ]; then
            bun ./scripts/bump.ts "${{ inputs.version-override }}"
            VERSION="${{ inputs.version-override }}"
          else
            bun ./scripts/bump.ts "${{ inputs.bump }}"
            VERSION=$(node -p "require('./packages/core/package.json').version")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Commit version bump
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git diff --cached --quiet && echo "No changes to commit" || (git commit -m "chore(release): ${{ steps.bump.outputs.version }}" && git push)

      - name: Create and push tag
        if: ${{ !inputs.skip-github-release }}
        run: |
          git tag -a "v${{ steps.bump.outputs.version }}" -m "Release v${{ steps.bump.outputs.version }}"
          git push --tags

      - name: Create GitHub Release
        if: ${{ !inputs.skip-github-release }}
        run: |
          if ! gh release view "v${{ steps.bump.outputs.version }}" >/dev/null 2>&1; then
            # Use previous tag as --from, or the release commit itself if no prior tags exist
            PREV_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
            if [ -n "$PREV_TAG" ]; then
              bunx changelogithub --from "$PREV_TAG"
            else
              bunx changelogithub --from "v${{ steps.bump.outputs.version }}"
            fi
          else
            echo "Release v${{ steps.bump.outputs.version }} already exists, skipping"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build all packages
        run: bun run build

      - name: Publish to NPM
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          PACKAGES=(core aws cloudflare gcp neon planetscale)

          for pkg in "${PACKAGES[@]}"; do
            PKG_NAME=$(node -p "require('./packages/${pkg}/package.json').name")
            echo "--- Publishing ${PKG_NAME}@${VERSION} ---"

            if npm view "${PKG_NAME}@${VERSION}" version >/dev/null 2>&1; then
              echo "${PKG_NAME}@${VERSION} already published, skipping"
              continue
            fi

            # Use bun to pack (resolves catalog: deps), then npm to publish (OIDC auth)
            cd "packages/${pkg}"
            bun pm pack --destination .
            TARBALL=$(ls *.tgz 2>/dev/null | head -1)
            echo "Publishing tarball: ${TARBALL}"
            # Use --tag for prerelease versions (e.g. 0.2.0-alpha), otherwise use latest
            TAG="latest"
            if echo "${VERSION}" | grep -q '-'; then
              TAG="next"
            fi
            npm publish "${TARBALL}" --access public --tag "${TAG}"
            rm -f *.tgz
            cd ../..

            echo "--- Published ${PKG_NAME}@${VERSION} ---"
          done
