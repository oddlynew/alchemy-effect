name: Publish Preview Package

on:
  push:
    branches: [main]
  pull_request:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      core: ${{ steps.changes.outputs.core }}
      cloudflare: ${{ steps.changes.outputs.cloudflare }}
      neon: ${{ steps.changes.outputs.neon }}
      planetscale: ${{ steps.changes.outputs.planetscale }}
      prisma-postgres: ${{ steps.changes.outputs.prisma-postgres }}
      stripe: ${{ steps.changes.outputs.stripe }}
      supabase: ${{ steps.changes.outputs.supabase }}
      coinbase: ${{ steps.changes.outputs.coinbase }}
      mongodb-atlas: ${{ steps.changes.outputs.mongodb-atlas }}
      fly-io: ${{ steps.changes.outputs.fly-io }}
      turso: ${{ steps.changes.outputs.turso }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            core:
              - 'packages/core/**'
            cloudflare:
              - 'packages/cloudflare/**'
            neon:
              - 'packages/neon/**'
            planetscale:
              - 'packages/planetscale/**'
            prisma-postgres:
              - 'packages/prisma-postgres/**'
            stripe:
              - 'packages/stripe/**'
            supabase:
              - 'packages/supabase/**'
            coinbase:
              - 'packages/coinbase/**'
            mongodb-atlas:
              - 'packages/mongodb-atlas/**'
            fly-io:
              - 'packages/fly-io/**'
            turso:
              - 'packages/turso/**'

  pkg-pr-core:
    needs: detect-changes
    if: needs.detect-changes.outputs.core == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run build
        working-directory: packages/core
      - run: bun scripts/generate-pnpm-workspace.yaml.ts
      - run: bun add -D pnpm && bunx pkg-pr-new publish --pnpm ./packages/core

  pkg-pr-cloudflare:
    needs: [detect-changes, pkg-pr-core]
    if: ${{ !failure() && needs.detect-changes.outputs.cloudflare == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run build
        working-directory: packages/core
      - run: bun run build
        working-directory: packages/cloudflare
      - run: bun scripts/generate-pnpm-workspace.yaml.ts
      - run: bun add -D pnpm && bunx pkg-pr-new publish --pnpm ./packages/cloudflare

  pkg-pr-neon:
    needs: [detect-changes, pkg-pr-cloudflare]
    if: ${{ !failure() && needs.detect-changes.outputs.neon == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run build
        working-directory: packages/core
      - run: bun run build
        working-directory: packages/neon
      - run: bun scripts/generate-pnpm-workspace.yaml.ts
      - run: bun add -D pnpm && bunx pkg-pr-new publish --pnpm ./packages/neon

  pkg-pr-planetscale:
    needs: [detect-changes, pkg-pr-neon]
    if: ${{ !failure() && needs.detect-changes.outputs.planetscale == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run build
        working-directory: packages/core
      - run: bun run build
        working-directory: packages/planetscale
      - run: bun scripts/generate-pnpm-workspace.yaml.ts
      - run: bun add -D pnpm && bunx pkg-pr-new publish --pnpm ./packages/planetscale

  pkg-pr-prisma-postgres:
    needs: [detect-changes, pkg-pr-planetscale]
    if: ${{ !failure() && needs.detect-changes.outputs.prisma-postgres == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run build
        working-directory: packages/core
      - run: bun run build
        working-directory: packages/prisma-postgres
      - run: bun scripts/generate-pnpm-workspace.yaml.ts
      - run: bun add -D pnpm && bunx pkg-pr-new publish --pnpm ./packages/prisma-postgres

  pkg-pr-stripe:
    needs: [detect-changes, pkg-pr-prisma-postgres]
    if: ${{ !failure() && needs.detect-changes.outputs.stripe == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run build
        working-directory: packages/core
      - run: bun run build
        working-directory: packages/stripe
      - run: bun scripts/generate-pnpm-workspace.yaml.ts
      - run: bun add -D pnpm && bunx pkg-pr-new publish --pnpm ./packages/stripe

  pkg-pr-supabase:
    needs: [detect-changes, pkg-pr-stripe]
    if: ${{ !failure() && needs.detect-changes.outputs.supabase == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run build
        working-directory: packages/core
      - run: bun run build
        working-directory: packages/supabase
      - run: bun scripts/generate-pnpm-workspace.yaml.ts
      - run: bun add -D pnpm && bunx pkg-pr-new publish --pnpm ./packages/supabase

  pkg-pr-mongodb-atlas:
    needs: [detect-changes, pkg-pr-supabase]
    if: ${{ !failure() && needs.detect-changes.outputs.mongodb-atlas == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run build
        working-directory: packages/core
      - run: bun run build
        working-directory: packages/mongodb-atlas
      - run: bun scripts/generate-pnpm-workspace.yaml.ts
      - run: bun add -D pnpm && bunx pkg-pr-new publish --pnpm ./packages/mongodb-atlas

  pkg-pr-fly-io:
    needs: [detect-changes, pkg-pr-supabase]
    if: ${{ !failure() && needs.detect-changes.outputs.fly-io == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run build
        working-directory: packages/core
      - run: bun run build
        working-directory: packages/fly-io
      - run: bun scripts/generate-pnpm-workspace.yaml.ts
      - run: bun add -D pnpm && bunx pkg-pr-new publish --pnpm ./packages/fly-io

  pkg-pr-turso:
    needs: [detect-changes, pkg-pr-supabase]
    if: ${{ !failure() && needs.detect-changes.outputs.turso == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run build
        working-directory: packages/core
      - run: bun run build
        working-directory: packages/turso
      - run: bun scripts/generate-pnpm-workspace.yaml.ts
      - run: bun add -D pnpm && bunx pkg-pr-new publish --pnpm ./packages/turso

  pkg-pr-coinbase:
    needs: [detect-changes, pkg-pr-supabase]
    if: ${{ !failure() && needs.detect-changes.outputs.coinbase == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
