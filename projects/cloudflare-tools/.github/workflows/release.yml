name: Release

on:
  workflow_dispatch:
    inputs:
      release-type:
        description: "Release type"
        required: true
        type: choice
        options:
          - patch
          - minor

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: default
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # changelogithub needs full history

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - run: bun install --frozen-lockfile

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        working-directory: packages/cloudflare-bundler
        run: |
          echo "fromVersion=$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"
          bun pm version ${{ inputs.release-type }} -m "chore(release): @distilled.cloud/cloudflare-bundler v%s"
          echo "toVersion=$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"

      - name: Debug git state in packages/cloudflare-bundler
        working-directory: packages/cloudflare-bundler
        run: |
          git status
          git log --oneline -3
          git tag --list

      - name: Debug git state in root
        run: |
          git status
          git log --oneline -3
          git tag --list

      # - name: Push version commit and tag
      #   run: git push --follow-tags

      # - name: Publish to npm with provenance
      #   working-directory: packages/cloudflare-bundler
      #   run: npm publish --provenance --access public

