name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, reopened, synchronize]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check (format, lint, typecheck)
        run: bun run check

      - name: Test
        run: bun run test
        env:
          TEST_MYSQL_URL: ${{ secrets.TEST_MYSQL_URL }}

      # Re-run the cloudflare-runtime spec with credentials so the remote
      # bindings integration test (which is `describe.skipIf` gated on
      # CLOUDFLARE_ACCOUNT_ID) actually executes. When secrets are unset,
      # `describe.skipIf` makes the file a no-op.
      - name: Cloudflare runtime remote bindings (integration)
        run: bun run --filter @distilled.cloud/cloudflare-runtime test
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TEST_KV_NAMESPACE_ID: ${{ secrets.TEST_KV_NAMESPACE_ID }}
          TEST_R2_BUCKET_NAME: ${{ secrets.TEST_R2_BUCKET_NAME }}
          TEST_D1_DATABASE_ID: ${{ secrets.TEST_D1_DATABASE_ID }}
          TEST_SERVICE_WORKER_NAME: ${{ secrets.TEST_SERVICE_WORKER_NAME }}
