[install]
# Keep installs deterministic and compatible with the Nx workspace layout.
linker = "hoisted"
registry = "https://registry.npmjs.org"
frozenLockfile = false
optional = true
dev = true

# Avoid resolving packages published in the last 72 hours unless the package is
# part of the fast-moving Effect, TypeScript, or dogfood release surface.
minimumReleaseAge = 259200
minimumReleaseAgeExcludes = [
  "@oddlynew/distilled-aws",
  "@oddlynew/distilled-axiom",
  "@oddlynew/distilled-cloudflare-rolldown-plugin",
  "@oddlynew/distilled-cloudflare-runtime",
  "@oddlynew/distilled-cloudflare-vite-plugin",
  "@oddlynew/distilled-cloudflare",
  "@oddlynew/distilled-core",
  "@oddlynew/distilled-neon",
  "@oddlynew/distilled-planetscale",
  "effect",
  "@effect/language-service",
  "@effect/platform-bun",
  "@effect/platform-node-shared",
  "@effect/platform-node",
  "@effect/sql-pg",
  "@effect/vitest",
  "typescript",
  "@typescript/native-preview",
  "@typescript/native-preview-win32-x64",
  "@typescript/native-preview-win32-arm64",
  "@typescript/native-preview-linux-x64",
  "@typescript/native-preview-linux-arm",
  "@typescript/native-preview-linux-arm64",
  "@typescript/native-preview-darwin-x64",
  "@typescript/native-preview-darwin-arm64",
  "@typescript/typescript-win32-x64",
  "@typescript/typescript-win32-arm64",
  "@typescript/typescript-linux-x64",
  "@typescript/typescript-linux-arm",
  "@typescript/typescript-linux-arm64",
  "@typescript/typescript-darwin-x64",
  "@typescript/typescript-darwin-arm64",
  "@typescript/typescript-aix-ppc64",
  "@typescript/typescript-freebsd-arm64",
  "@typescript/typescript-freebsd-x64",
  "@typescript/typescript-linux-loong64",
  "@typescript/typescript-linux-mips64el",
  "@typescript/typescript-linux-ppc64",
  "@typescript/typescript-linux-riscv64",
  "@typescript/typescript-linux-s390x",
  "@typescript/typescript-netbsd-arm64",
  "@typescript/typescript-netbsd-x64",
  "@typescript/typescript-openbsd-arm64",
  "@typescript/typescript-openbsd-x64",
  "@typescript/typescript-sunos-x64",
]
