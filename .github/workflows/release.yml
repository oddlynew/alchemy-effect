name: release

on:
  workflow_dispatch:
    inputs:
      group:
        description: Release group to version and publish.
        required: true
        type: choice
        default: alchemy
        options:
          - alchemy
          - alchemy-node-utils
          - distilled
          - cloudflare-tools
      specifier:
        description: Release specifier. Empty uses the group default.
        required: false
        type: string
        default: ""
      dry-run:
        description: Preview version, changelog, and publish plan without writing.
        required: true
        type: boolean
        default: true
      first-release:
        description: Use --first-release. Dogfood groups should normally use scoped baseline tags instead.
        required: true
        type: choice
        default: "false"
        options:
          - "true"
          - "false"
      preid:
        description: Optional prerelease identifier, for example beta.
        required: false
        type: string
        default: beta

concurrency:
  group: release-${{ github.ref }}-${{ inputs.group }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

env:
  NODE_VERSION: "24"
  RELEASE_BRANCH: main
  NPM_CONFIG_PROVENANCE: "true"

jobs:
  release:
    runs-on: ubuntu-large
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          filter: tree:0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.13

      - run: bun install --frozen-lockfile

      - name: Configure release git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run Nx release
        shell: bash
        env:
          RELEASE_GROUP: ${{ inputs.group }}
          SPECIFIER: ${{ inputs.specifier }}
          DRY_RUN: ${{ inputs['dry-run'] }}
          FIRST_RELEASE: ${{ inputs['first-release'] }}
          PREID: ${{ inputs.preid }}
        run: |
          set -euo pipefail

          if [ "${DRY_RUN}" != "true" ] && [ "${GITHUB_REF}" != "refs/heads/${RELEASE_BRANCH}" ]; then
            echo "Refusing to publish ${RELEASE_GROUP} from ${GITHUB_REF}; non-dry releases must run from ${RELEASE_BRANCH}." >&2
            exit 1
          fi

          if [ -z "${SPECIFIER}" ]; then
            case "${RELEASE_GROUP}" in
              alchemy)
                SPECIFIER="prerelease"
                ;;
              alchemy-node-utils | distilled | cloudflare-tools)
                SPECIFIER="patch"
                ;;
            esac
          fi

          args=(release "${SPECIFIER}" "--groups=${RELEASE_GROUP}")

          case "${RELEASE_GROUP}" in
            alchemy)
              release_tag_pattern="@oddlynew/alchemy@*"
              ;;
            alchemy-node-utils)
              release_tag_pattern="@oddlynew/alchemy-node-utils@*"
              ;;
            distilled)
              release_tag_pattern="@oddlynew/distilled@*"
              ;;
            cloudflare-tools)
              release_tag_pattern="@oddlynew/cloudflare-tools@*"
              ;;
          esac

          if [ "${DRY_RUN}" = "true" ]; then
            args+=(--dry-run --skip-publish)
          else
            args+=(--yes)
          fi

          case "${FIRST_RELEASE}" in
            true)
              args+=(--first-release)
              ;;
            false)
              if ! git tag --list "${release_tag_pattern}" | grep -q .; then
                echo "Missing ${RELEASE_GROUP} dogfood baseline tag matching ${release_tag_pattern}." >&2
                echo "Create the dogfood baseline tag before running a normal release, or explicitly set first-release=true." >&2
                exit 1
              fi
              ;;
            *)
              echo "Unsupported first-release value: ${FIRST_RELEASE}" >&2
              exit 1
              ;;
          esac

          if [ -n "${PREID}" ] && [ "${SPECIFIER}" = "prerelease" ]; then
            args+=(--preid "${PREID}")
          fi

          bun nx "${args[@]}"

          if [ "${DRY_RUN}" != "true" ]; then
            git push origin "HEAD:${GITHUB_REF_NAME}" --follow-tags
          fi
