name: release

on:
  workflow_dispatch:
    inputs:
      group:
        description: Release group to version and publish.
        required: true
        type: choice
        default: all
        options:
          - all
          - alchemy
          - alchemy-node-utils
          - distilled
          - cloudflare-tools
      specifier:
        description: Optional release specifier. Empty lets Nx infer from conventional commits.
        required: false
        type: string
        default: ""
      dry-run:
        description: Preview version, changelog, and publish plan without writing.
        required: true
        type: boolean
        default: true
      force:
        description: Release selected groups even when the path gate finds no relevant changes.
        required: true
        type: boolean
        default: false
      first-release:
        description: Use --first-release. Dogfood groups should normally use scoped baseline tags instead.
        required: true
        type: choice
        default: "false"
        options:
          - "true"
          - "false"
      preid:
        description: Prerelease identifier for prerelease lines such as Alchemy's beta line.
        required: false
        type: string
        default: beta
  schedule:
    # Daily 06:17 UTC release train for npm latest.
    - cron: "17 6 * * *"

concurrency:
  group: release-${{ github.ref }}-${{ github.event_name == 'workflow_dispatch' && inputs.group || 'scheduled' }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

env:
  NODE_VERSION: "24"
  RELEASE_BRANCH: main
  NPM_CONFIG_PROVENANCE: "true"

jobs:
  release:
    runs-on:
      group: "Default Larger Runners"
      labels: "ubuntu-large"
    timeout-minutes: 15
    environment: ${{ (github.event_name == 'schedule' || inputs['dry-run'] == false) && 'production' || '' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          filter: tree:0
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.13

      - run: bun install --frozen-lockfile

      - name: Generate release bot token
        id: app-token
        if: github.event_name == 'schedule' || inputs['dry-run'] == false
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Configure release git identity
        env:
          RELEASE_APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
          SHOULD_PUBLISH: ${{ github.event_name == 'schedule' || inputs['dry-run'] == false }}
        run: |
          if [ "${SHOULD_PUBLISH}" = "true" ]; then
            git config user.name "${RELEASE_APP_SLUG}[bot]"
            git config user.email "${RELEASE_APP_SLUG}[bot]@users.noreply.github.com"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          fi

      - name: Run Nx release train
        shell: bash
        env:
          INPUT_GROUP: ${{ github.event_name == 'workflow_dispatch' && inputs.group || 'all' }}
          INPUT_SPECIFIER: ${{ github.event_name == 'workflow_dispatch' && inputs.specifier || '' }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs['dry-run'] || 'false' }}
          FORCE_RELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.force || 'false' }}
          FIRST_RELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs['first-release'] || 'false' }}
          PREID: ${{ github.event_name == 'workflow_dispatch' && inputs.preid || 'beta' }}
          RELEASE_APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail

          all_groups=(alchemy alchemy-node-utils distilled cloudflare-tools)

          if [ "${DRY_RUN}" != "true" ] && [ "${GITHUB_REF}" != "refs/heads/${RELEASE_BRANCH}" ]; then
            echo "Refusing to publish from ${GITHUB_REF}; non-dry releases must run from ${RELEASE_BRANCH}." >&2
            exit 1
          fi

          case "${INPUT_GROUP}" in
            all)
              release_groups=("${all_groups[@]}")
              ;;
            alchemy | alchemy-node-utils | distilled | cloudflare-tools)
              release_groups=("${INPUT_GROUP}")
              ;;
            *)
              echo "Unsupported release group: ${INPUT_GROUP}" >&2
              exit 1
              ;;
          esac

          release_tag_pattern() {
            case "$1" in
              alchemy)
                echo "@oddlynew/alchemy@*"
                ;;
              alchemy-node-utils)
                echo "@oddlynew/alchemy-node-utils@*"
                ;;
              distilled)
                echo "@oddlynew/distilled@*"
                ;;
              cloudflare-tools)
                echo "@oddlynew/cloudflare-tools@*"
                ;;
              *)
                return 1
                ;;
            esac
          }

          group_paths() {
            case "$1" in
              alchemy)
                printf '%s\n' \
                  "projects/alchemy/packages/alchemy" \
                  "projects/alchemy/packages/better-auth" \
                  "projects/alchemy/packages/pr-package"
                ;;
              alchemy-node-utils)
                printf '%s\n' "packages/alchemy-node-utils"
                ;;
              distilled)
                printf '%s\n' \
                  "projects/distilled/packages" \
                  "projects/distilled/tsconfig.json"
                ;;
              cloudflare-tools)
                printf '%s\n' \
                  "projects/cloudflare-tools/packages" \
                  "projects/cloudflare-tools/tsconfig.json"
                ;;
              *)
                return 1
                ;;
            esac
          }

          shared_release_inputs() {
            printf '%s\n' \
              "package.json" \
              "bun.lock" \
              "bunfig.toml"
          }

          latest_group_tag() {
            git tag --list "$(release_tag_pattern "$1")" --sort=-version:refname | head -n 1
          }

          has_relevant_changes() {
            local group="$1"
            local tag="$2"
            local paths=()

            while IFS= read -r path; do
              paths+=("${path}")
            done < <(
              group_paths "${group}"
              shared_release_inputs
            )

            ! git diff --quiet "${tag}..HEAD" -- "${paths[@]}"
          }

          released_any=false

          for release_group in "${release_groups[@]}"; do
            release_tag="$(latest_group_tag "${release_group}")"

            if [ -z "${release_tag}" ]; then
              if [ "${FIRST_RELEASE}" != "true" ]; then
                echo "Missing ${release_group} dogfood baseline tag matching $(release_tag_pattern "${release_group}")." >&2
                echo "Create the dogfood baseline tag before running a normal release, or explicitly set first-release=true." >&2
                exit 1
              fi
            elif [ "${FORCE_RELEASE}" != "true" ] && ! has_relevant_changes "${release_group}" "${release_tag}"; then
              echo "Skipping ${release_group}; no relevant changes since ${release_tag}."
              continue
            fi

            args=(release)

            if [ -n "${INPUT_SPECIFIER}" ]; then
              args+=("${INPUT_SPECIFIER}")
            fi

            args+=("--groups=${release_group}")

            if [ "${DRY_RUN}" = "true" ]; then
              args+=(--dry-run --skip-publish)
            else
              args+=(--yes)
            fi

            case "${FIRST_RELEASE}" in
              true)
                args+=(--first-release)
                ;;
              false)
                ;;
              *)
                echo "Unsupported first-release value: ${FIRST_RELEASE}" >&2
                exit 1
                ;;
            esac

            if [ -n "${PREID}" ] && [ "${release_group}" = "alchemy" ]; then
              args+=(--preid "${PREID}")
            fi

            echo "Running: bun nx ${args[*]}"
            bun nx "${args[@]}"
            released_any=true
          done

          if [ "${released_any}" != "true" ]; then
            echo "No release groups had relevant changes."
            exit 0
          fi

          if [ "${DRY_RUN}" != "true" ]; then
            if [ -z "${RELEASE_APP_TOKEN}" ]; then
              echo "Missing release app token for publishing." >&2
              exit 1
            fi

            git -c "http.https://github.com/.extraheader=AUTHORIZATION: bearer ${RELEASE_APP_TOKEN}" \
              push origin "HEAD:${GITHUB_REF_NAME}" --follow-tags
          fi
