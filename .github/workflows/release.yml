name: release

on:
  workflow_dispatch:
    inputs:
      group:
        description: Release group to version and publish.
        required: true
        type: choice
        default: alchemy
        options:
          - alchemy
          - distilled
          - cloudflare-tools
      specifier:
        description: Release specifier. Empty uses the group default.
        required: false
        type: string
        default: ""
      dry-run:
        description: Preview version, changelog, and publish plan without writing.
        required: true
        type: boolean
        default: true
      first-release:
        description: Use for the first monorepo release of imported groups before baseline tags exist.
        required: true
        type: boolean
        default: false
      preid:
        description: Optional prerelease identifier, for example beta.
        required: false
        type: string
        default: beta

concurrency:
  group: release-${{ github.ref }}-${{ inputs.group }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

env:
  NODE_VERSION: "24"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          filter: tree:0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Run Nx release
        shell: bash
        env:
          RELEASE_GROUP: ${{ inputs.group }}
          SPECIFIER: ${{ inputs.specifier }}
          DRY_RUN: ${{ inputs['dry-run'] }}
          FIRST_RELEASE: ${{ inputs['first-release'] }}
          PREID: ${{ inputs.preid }}
        run: |
          set -euo pipefail

          if [ -z "${SPECIFIER}" ]; then
            case "${RELEASE_GROUP}" in
              alchemy)
                SPECIFIER="prerelease"
                ;;
              distilled | cloudflare-tools)
                SPECIFIER="patch"
                ;;
            esac
          fi

          args=(release "${SPECIFIER}" "--groups=${RELEASE_GROUP}")

          if [ "${DRY_RUN}" = "true" ]; then
            args+=(--dry-run --skip-publish)
          else
            args+=(--yes)
          fi

          if [ "${FIRST_RELEASE}" = "true" ]; then
            args+=(--first-release)
          fi

          if [ -n "${PREID}" ]; then
            args+=(--preid "${PREID}")
          fi

          bun nx "${args[@]}"
