name: website

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "projects/alchemy/apps/website/**"
      - "projects/alchemy/packages/alchemy/**"
      - "bun.lock"
      - ".github/workflows/website.yml"
  pull_request:
    # `labeled` so adding `deploy-website` on an open PR triggers a
    # deploy without needing another push.
    types:
      - opened
      - reopened
      - synchronize
      - labeled
      - closed
    paths:
      - "projects/alchemy/apps/website/**"
      - "projects/alchemy/packages/alchemy/**"
      - "bun.lock"
      - ".github/workflows/website.yml"

concurrency:
  group: deploy-website-${{ github.ref }}
  cancel-in-progress: false

env:
  STAGE: ${{ github.event_name == 'pull_request' && format('pr-{0}',
    github.event.number) || (github.ref == 'refs/heads/main' && 'prod' ||
    github.ref_name) }}
  IS_PROD_DEPLOY: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}

jobs:
  deploy:
    # Deploy on push-to-main and `workflow_dispatch` always. On PRs,
    # require BOTH:
    #   - the PR is internal (forks can't access bot/Cloudflare secrets
    #     so `create-github-app-token` would error immediately), AND
    #   - the PR carries the `deploy-website` label (opt-in — most PRs
    #     don't need a website preview, so default to skipping).
    if: >-
      github.event.action != 'closed' &&
      (github.event_name != 'pull_request' ||
       (github.event.pull_request.head.repo.full_name == github.repository &&
        contains(github.event.pull_request.labels.*.name, 'deploy-website')))
    runs-on: ubuntu-latest
    environment: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && 'production' || '' }}
    permissions:
      contents: read
      pull-requests: write
    env:
      BOT_APP_CONFIGURED: ${{ secrets.ALCHEMY_VERSION_BOT_ID != '' && secrets.ALCHEMY_VERSION_BOT_PRIVATE_KEY != '' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Mint a token for the alchemy-version-bot GitHub App so the PR
      # preview comment (created via GitHub.Comment in alchemy.run.ts)
      # posts under the bot's identity instead of `github-actions[bot]`. The
      # fork can run without this App; the deploy step falls back to the
      # workflow token when the bot secrets are not configured.
      - name: Generate bot token
        if: env.BOT_APP_CONFIGURED == 'true'
        id: bot-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.ALCHEMY_VERSION_BOT_ID }}
          private-key: ${{ secrets.ALCHEMY_VERSION_BOT_PRIVATE_KEY }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Guard production deploy
        shell: bash
        run: |-
          if [ "${STAGE}" = "prod" ] && [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "ERROR: prod website deploys must run from main."
            exit 1
          fi

          if [[ "${STAGE}" == prod* && "${STAGE}" != "prod" ]]; then
            echo "ERROR: non-main website stages may not use a prod-like stage name."
            exit 1
          fi

      # Build the website ahead of `alchemy deploy`. The
      # Cloudflare.StaticSite resource declares the same `bun run build`
      # in its config and runs it as part of the create lifecycle, but
      # on update plans alchemy reads `dist/` during plan.diff before
      # the embedded Build resource gets a chance to (re)run, causing
      # a NotFound on a fresh CI checkout. Building here makes the
      # workflow correct under both create and update plans.
      - name: Build website
        working-directory: projects/alchemy/apps/website
        run: bun run build

      # Cloudflare credentials are passed explicitly so PR previews do not need
      # a broader secret manager context.
      - name: Deploy
        working-directory: projects/alchemy/apps/website
        run: bun alchemy deploy --stage "$STAGE" --yes
        env:
          PULL_REQUEST: ${{ github.event.number }}
          CLOUDFLARE_API_TOKEN: ${{ env.IS_PROD_DEPLOY == 'true' && secrets.PROD_CLOUDFLARE_API_TOKEN || secrets.TEST_CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.IS_PROD_DEPLOY == 'true' && secrets.PROD_CLOUDFLARE_ACCOUNT_ID || secrets.TEST_CLOUDFLARE_ACCOUNT_ID }}
          BUILD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          GITHUB_TOKEN: ${{ steps.bot-token.outputs.token || github.token }}

  cleanup:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'pull_request' && github.event.action == 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      contains(github.event.pull_request.labels.*.name, 'deploy-website')
    permissions:
      contents: read
      pull-requests: write
    env:
      BOT_APP_CONFIGURED: ${{ secrets.ALCHEMY_VERSION_BOT_ID != '' && secrets.ALCHEMY_VERSION_BOT_PRIVATE_KEY != '' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main

      - name: Generate bot token
        if: env.BOT_APP_CONFIGURED == 'true'
        id: bot-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.ALCHEMY_VERSION_BOT_ID }}
          private-key: ${{ secrets.ALCHEMY_VERSION_BOT_PRIVATE_KEY }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.13

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@4819d808ab99e5cde19a0637a16536a4038fad73 # v4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Safety Check
        run: |-
          if [ "${{ env.STAGE }}" = "prod" ]; then
            echo "ERROR: Cannot destroy prod environment in cleanup job"
            exit 1
          fi

      - name: Destroy Preview Environment
        working-directory: projects/alchemy/apps/website
        run: >-
          doppler run --project "$DOPPLER_PROJECT" --config "$DOPPLER_CONFIG"
          -- bun alchemy destroy --stage "$STAGE" --yes
        env:
          DOPPLER_PROJECT: alchemy-effect-fork
          DOPPLER_CONFIG: dev
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          PULL_REQUEST: ${{ github.event.number }}
          GITHUB_TOKEN: ${{ steps.bot-token.outputs.token || github.token }}
