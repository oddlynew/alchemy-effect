name: nx validate

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - reopened
      - ready_for_review
      - synchronize
  workflow_dispatch:

concurrency:
  group: nx-validate-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  actions: read
  contents: read
  pull-requests: read

env:
  NODE_VERSION: "24"
  NX_PRODUCTION_EXCLUDE: "@oddlynew/distilled,@oddlynew/cloudflare-tools,@oddlynew/alchemy-website,@oddlynew/alchemy-example-*,@oddlynew/cloudflare-tools-fixture-*"

jobs:
  affected:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && 'production' || '' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          filter: tree:0

      - uses: nrwl/nx-set-shas@v5
        with:
          main-branch-name: main

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Configure Nx R2 remote cache
        run: .github/scripts/configure-nx-r2-cache.sh
        env:
          NX_R2_CACHE_SERVER_URL: ${{ vars.NX_R2_CACHE_SERVER_URL }}
          NX_R2_CACHE_BRANCH_TOKEN: ${{ secrets.NX_R2_CACHE_BRANCH_TOKEN }}
          NX_R2_CACHE_TRUSTED_TOKEN: ${{ secrets.NX_R2_CACHE_TRUSTED_TOKEN }}
          PULL_REQUEST: ${{ github.event.number }}

      - run: bun install --frozen-lockfile

      - name: Lint PR commits
        if: github.event_name == 'pull_request'
        run: .github/scripts/lint-pr-commits.sh ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }}

      - run: bun nx affected -t build --parallel=1 --exclude="$NX_PRODUCTION_EXCLUDE"
      - run: bun nx affected -t typecheck --parallel=3 --exclude="$NX_PRODUCTION_EXCLUDE"
      - run: bun nx affected -t lint --parallel=3 --exclude="$NX_PRODUCTION_EXCLUDE"
      - run: bun nx test nx-r2-cache-worker
