name: CI

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - reopened
      - ready_for_review
      - synchronize
      - labeled
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  actions: read
  contents: read
  pull-requests: write

env:
  NODE_VERSION: "24"
  GOMAXPROCS: "4"
  NX_PRODUCTION_EXCLUDE: "@oddlynew/alchemy-website,@oddlynew/alchemy-example-*,@oddlynew/cloudflare-tools-fixture-*"
  STAGE: ${{ github.event_name == 'pull_request' && format('pr-{0}',
    github.event.number) || (github.ref == 'refs/heads/main' && 'prod' ||
    github.ref_name) }}
  IS_PROD_DEPLOY: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}

jobs:
  ci:
    if: >-
      (github.event_name != 'pull_request' || github.event.pull_request.draft == false) &&
      (
        github.event.action != 'labeled' ||
        contains(github.event.pull_request.labels.*.name, 'deploy-website')
      )
    # Public fork PRs are controlled by GitHub's workflow-approval setting;
    # keep this on `pull_request`, not `pull_request_target`, because this job
    # checks out and executes PR code.
    runs-on: ubuntu-large
    timeout-minutes: 15
    environment: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && 'production' || '' }}
    env:
      BOT_APP_CONFIGURED: ${{ secrets.ALCHEMY_VERSION_BOT_ID != '' && secrets.ALCHEMY_VERSION_BOT_PRIVATE_KEY != '' }}
      SHOULD_DEPLOY_WEBSITE: >-
        ${{
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (
            github.event_name == 'pull_request' &&
            github.event.pull_request.head.repo.full_name == github.repository &&
            contains(github.event.pull_request.labels.*.name, 'deploy-website')
          )
        }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          filter: tree:0

      - uses: nrwl/nx-set-shas@afb73a62d26e41464e9254689e1fd6122ee683c1 # v5
        with:
          main-branch-name: main

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.13

      - name: Configure Nx R2 remote cache
        run: .github/scripts/configure-nx-r2-cache.sh
        env:
          NX_R2_CACHE_SERVER_URL: ${{ vars.NX_R2_CACHE_SERVER_URL }}
          NX_R2_CACHE_BRANCH_TOKEN: ${{ secrets.NX_R2_CACHE_BRANCH_TOKEN }}
          NX_R2_CACHE_TRUSTED_TOKEN: ${{ secrets.NX_R2_CACHE_TRUSTED_TOKEN }}
          PULL_REQUEST: ${{ github.event.number }}

      - run: bun install --frozen-lockfile

      - name: Lint PR commits
        if: github.event_name == 'pull_request' && github.event.action != 'labeled'
        run: .github/scripts/lint-pr-commits.sh ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }}

      - run: bun oxfmt --check .
        if: github.event.action != 'labeled'

      - run: bun nx affected -t build --parallel=3 --exclude="$NX_PRODUCTION_EXCLUDE"
        if: github.event.action != 'labeled'

      - run: bun nx affected -t typecheck --parallel=3 --exclude="$NX_PRODUCTION_EXCLUDE"
        if: github.event.action != 'labeled'

      - run: bun nx affected -t lint --parallel=3 --exclude="$NX_PRODUCTION_EXCLUDE"
        if: github.event.action != 'labeled'

      - run: bun nx run @oddlynew/alchemy-website:docs:check
        if: github.event.action != 'labeled'

      - run: bun nx test nx-r2-cache-worker
        if: github.event.action != 'labeled'

      - name: Generate bot token
        if: env.SHOULD_DEPLOY_WEBSITE == 'true' && env.BOT_APP_CONFIGURED == 'true'
        id: bot-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.ALCHEMY_VERSION_BOT_ID }}
          private-key: ${{ secrets.ALCHEMY_VERSION_BOT_PRIVATE_KEY }}

      - name: Guard production deploy
        if: env.SHOULD_DEPLOY_WEBSITE == 'true'
        shell: bash
        run: |-
          if [ "${STAGE}" = "prod" ] && [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "ERROR: prod website deploys must run from main."
            exit 1
          fi

          if [[ "${STAGE}" == prod* && "${STAGE}" != "prod" ]]; then
            echo "ERROR: non-main website stages may not use a prod-like stage name."
            exit 1
          fi

      - name: Deploy website
        if: env.SHOULD_DEPLOY_WEBSITE == 'true'
        run: bun nx deploy @oddlynew/alchemy-website
        env:
          PULL_REQUEST: ${{ github.event.number }}
          CLOUDFLARE_API_TOKEN: ${{ env.IS_PROD_DEPLOY == 'true' && secrets.PROD_CLOUDFLARE_API_TOKEN || secrets.TEST_CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.IS_PROD_DEPLOY == 'true' && secrets.PROD_CLOUDFLARE_ACCOUNT_ID || secrets.TEST_CLOUDFLARE_ACCOUNT_ID }}
          BUILD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          GITHUB_TOKEN: ${{ steps.bot-token.outputs.token || github.token }}
