name: CI

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - reopened
      - ready_for_review
      - synchronize
      - labeled
  workflow_dispatch:

# Cancel previous PR runs when new commits are pushed, but let production runs finish.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  actions: read
  contents: read
  pull-requests: write

env:
  NODE_VERSION: "24"
  GOMAXPROCS: "4"
  NX_VALIDATION_EXCLUDE: "@oddlynew/alchemy-example-*,@oddlynew/cloudflare-tools-fixture-*"
  NX_CI_TEST_EXCLUDE: "*,!tag:test:ci"
  STAGE: ${{ github.event_name == 'pull_request' && format('pr-{0}',
    github.event.number) || (github.ref == 'refs/heads/main' && 'prod' ||
    github.ref_name) }}
  IS_PROD_DEPLOY: ${{ github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}

jobs:
  ci:
    if: >-
      (github.event_name != 'pull_request' || github.event.pull_request.draft == false) &&
      (
        github.event.action != 'labeled' ||
        contains(github.event.pull_request.labels.*.name, 'deploy-preview')
      ) &&
      (
        github.event_name != 'push' ||
        (
          !contains(github.event.head_commit.message, '[skip ci]') &&
          !contains(github.event.head_commit.message, 'chore(release): publish')
        )
      )
    # Public fork PRs are controlled by GitHub's workflow-approval setting;
    # keep this on `pull_request`, not `pull_request_target`, because this job
    # checks out and executes PR code.
    runs-on:
      group: "Default Larger Runners"
      labels: "ubuntu-large"
    timeout-minutes: 15
    environment: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && 'production' || '' }}
    env:
      BOT_APP_CONFIGURED: ${{ secrets.ALCHEMY_VERSION_BOT_ID != '' && secrets.ALCHEMY_VERSION_BOT_PRIVATE_KEY != '' }}
      SHOULD_DEPLOY: >-
        ${{
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (
            github.event_name == 'pull_request' &&
            github.event.pull_request.head.repo.full_name == github.repository &&
            contains(github.event.pull_request.labels.*.name, 'deploy-preview')
          )
        }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Derive SHAs for Nx Affected
        uses: nrwl/nx-set-shas@afb73a62d26e41464e9254689e1fd6122ee683c1 # v5
        with:
          main-branch-name: main

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.13

      - name: Configure Nx R2 remote cache
        run: .github/scripts/configure-nx-r2-cache.sh
        env:
          NX_R2_CACHE_SERVER_URL: ${{ vars.NX_R2_CACHE_SERVER_URL }}
          NX_R2_CACHE_BRANCH_TOKEN: ${{ secrets.NX_R2_CACHE_BRANCH_TOKEN }}
          NX_R2_CACHE_TRUSTED_TOKEN: ${{ secrets.NX_R2_CACHE_TRUSTED_TOKEN }}
          PULL_REQUEST: ${{ github.event.number }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint PR commits
        if: github.event_name == 'pull_request' && github.event.action != 'labeled'
        run: .github/scripts/lint-pr-commits.sh ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }}

      - name: Format check
        run: bun oxfmt --check .
        if: github.event.action != 'labeled'

      - name: Build affected projects
        run: bun nx affected -t build --parallel=3 --exclude="$NX_VALIDATION_EXCLUDE"
        if: github.event.action != 'labeled'

      - name: Typecheck affected projects
        run: bun nx affected -t typecheck --parallel=3 --exclude="$NX_VALIDATION_EXCLUDE"
        if: github.event.action != 'labeled'

      - name: Lint affected projects
        run: bun nx affected -t lint --parallel=3 --exclude="$NX_VALIDATION_EXCLUDE"
        if: github.event.action != 'labeled'

      - name: Check if CI tests are affected
        id: check-tests
        if: github.event.action != 'labeled'
        run: |-
          affected=$(bun nx show projects --affected --with-target test --exclude="$NX_CI_TEST_EXCLUDE" 2>/dev/null || true)

          if [ -z "$affected" ]; then
            echo "needed=false" >> "$GITHUB_OUTPUT"
            echo "No affected CI test projects."
            exit 0
          fi

          echo "needed=true" >> "$GITHUB_OUTPUT"
          echo "Affected CI test projects:"
          echo "$affected"

      - name: Test affected projects
        if: github.event.action != 'labeled' && steps.check-tests.outputs.needed == 'true'
        timeout-minutes: 10
        run: bun nx affected -t test --exclude="$NX_CI_TEST_EXCLUDE" --parallel=3

      - name: Bootstrap Cloudflare state store
        if: env.SHOULD_DEPLOY == 'true'
        run: |-
          bun nx build @oddlynew/alchemy
          bunx alchemy cloudflare bootstrap --profile "$ALCHEMY_PROFILE"
        env:
          ALCHEMY_PROFILE: ${{ env.IS_PROD_DEPLOY == 'true' && 'prod' || 'preview' }}
          CLOUDFLARE_API_TOKEN: ${{ env.IS_PROD_DEPLOY == 'true' && secrets.PROD_CLOUDFLARE_API_TOKEN || secrets.TEST_CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.IS_PROD_DEPLOY == 'true' && secrets.PROD_CLOUDFLARE_ACCOUNT_ID || secrets.TEST_CLOUDFLARE_ACCOUNT_ID }}

      - name: Generate bot token
        if: env.SHOULD_DEPLOY == 'true' && env.BOT_APP_CONFIGURED == 'true'
        id: bot-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.ALCHEMY_VERSION_BOT_ID }}
          private-key: ${{ secrets.ALCHEMY_VERSION_BOT_PRIVATE_KEY }}

      - name: Guard production deploy
        if: env.SHOULD_DEPLOY == 'true'
        shell: bash
        run: |-
          if [ "${STAGE}" = "prod" ] && [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "ERROR: prod website deploys must run from main."
            exit 1
          fi

          if [[ "${STAGE}" == prod* && "${STAGE}" != "prod" ]]; then
            echo "ERROR: non-main website stages may not use a prod-like stage name."
            exit 1
          fi

      - name: Deploy tagged apps
        if: env.SHOULD_DEPLOY == 'true'
        run: bun nx run-many -t deploy --projects=tag:deploy:ci --parallel=1
        env:
          ALCHEMY_PROFILE: ${{ env.IS_PROD_DEPLOY == 'true' && 'prod' || 'preview' }}
          PULL_REQUEST: ${{ github.event.number }}
          CLOUDFLARE_API_TOKEN: ${{ env.IS_PROD_DEPLOY == 'true' && secrets.PROD_CLOUDFLARE_API_TOKEN || secrets.TEST_CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.IS_PROD_DEPLOY == 'true' && secrets.PROD_CLOUDFLARE_ACCOUNT_ID || secrets.TEST_CLOUDFLARE_ACCOUNT_ID }}
          BUILD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          GITHUB_TOKEN: ${{ steps.bot-token.outputs.token || github.token }}
          ALCHEMY_WEBSITE_DOMAIN: ${{ vars.ALCHEMY_WEBSITE_DOMAIN }}
          ALCHEMY_WEBSITE_WORKER_NAME: ${{ vars.ALCHEMY_WEBSITE_WORKER_NAME }}
