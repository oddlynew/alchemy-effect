name: Cleanup Preview

on:
  pull_request:
    types:
      - closed

concurrency:
  group: cleanup-website-${{ github.event.number }}

env:
  STAGE: ${{ format('pr-{0}', github.event.number) }}

jobs:
  cleanup:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      contains(github.event.pull_request.labels.*.name, 'deploy-preview')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
    env:
      BOT_APP_CONFIGURED: ${{ secrets.ALCHEMY_VERSION_BOT_ID != '' && secrets.ALCHEMY_VERSION_BOT_PRIVATE_KEY != '' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.13

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@4819d808ab99e5cde19a0637a16536a4038fad73 # v4

      - run: bun install --frozen-lockfile

      - name: Generate bot token
        if: env.BOT_APP_CONFIGURED == 'true'
        id: bot-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.ALCHEMY_VERSION_BOT_ID }}
          private-key: ${{ secrets.ALCHEMY_VERSION_BOT_PRIVATE_KEY }}

      - name: Safety check
        run: |-
          if [ "${STAGE}" = "prod" ]; then
            echo "ERROR: Cannot destroy prod environment in cleanup job."
            exit 1
          fi

      - name: Destroy tagged app previews
        run: >-
          doppler run --project "$DOPPLER_PROJECT" --config "$DOPPLER_CONFIG"
          -- bun nx run-many -t destroy --projects=tag:deploy:ci --parallel=1
        env:
          DOPPLER_PROJECT: alchemy-effect-fork
          DOPPLER_CONFIG: dev
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          PULL_REQUEST: ${{ github.event.number }}
          GITHUB_TOKEN: ${{ steps.bot-token.outputs.token || github.token }}
